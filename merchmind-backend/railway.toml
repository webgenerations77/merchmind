[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[[services]]
name = "web"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "worker"
startCommand = "celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2"

[[services]]
name = "beat"
startCommand = "celery -A app.tasks.celery_app.celery_app beat --loglevel=info"
